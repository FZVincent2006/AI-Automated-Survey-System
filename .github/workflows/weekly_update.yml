name: Weekly Update

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run literature review pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: https://api.deepseek.com/v1
          OPENAI_MODEL: deepseek-chat
          ARXIV_SEARCH_QUERY: "Multi-Agent Collaboration OR Agentic Workflow"
          ARXIV_MAX_RESULTS: 20
        run: |
          cd scripts
          python fetch_arxiv.py --max-results 20
          python generate_cards.py
          python cluster_analysis.py
          python weekly_survey_generator.py

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data output
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update weekly literature review outputs"
          git push origin HEAD:main
